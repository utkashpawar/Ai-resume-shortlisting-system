<!DOCTYPE html>

<html>
<head>

<title>AI Resume Shortlisting System</title>

<style>

body{
font-family:Arial;
background:linear-gradient(120deg,#6a11cb,#2575fc);
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:12px;
max-width:900px;
margin:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#333;
}

.description{
background:#f4f4f4;
padding:15px;
border-radius:8px;
margin-bottom:20px;
}

textarea{
width:100%;
height:120px;
margin-top:10px;
margin-bottom:20px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.upload{
border:2px dashed #2575fc;
padding:20px;
text-align:center;
border-radius:8px;
margin-bottom:20px;
cursor:pointer;
color:#2575fc;
}

.upload:hover{
background:#f0f4ff;
}

button{
padding:12px 20px;
border:none;
border-radius:6px;
background:#2575fc;
color:white;
font-size:16px;
cursor:pointer;
margin-right:10px;
}

button:hover{
background:#1a5ed8;
}

.progress{
width:100%;
background:#eee;
border-radius:20px;
margin-top:20px;
}

.bar{
height:25px;
background:#28a745;
border-radius:20px;
text-align:center;
color:white;
line-height:25px;
width:0%;
}

#result{
background:#f4f4f4;
padding:20px;
margin-top:20px;
border-radius:8px;
white-space:pre-line;
}

</style>

</head>

<body>

<div class="container">

<h2>AI Resume Shortlisting System</h2>

<div class="description">
This system analyzes resumes and compares them with job descriptions to calculate a skill match score and recommend missing skills.
</div>

<div class="upload" onclick="document.getElementById('resumeFile').click()">
Click here to upload resume (.txt)
</div>

<input type="file" id="resumeFile" style="display:none">

<h3>Or Paste Resume</h3>
<textarea id="resume"></textarea>

<h3>Paste Job Description</h3>
<textarea id="job"></textarea>

<button onclick="analyze()">Analyze Resume</button> <button onclick="openGemini()">Analyze with Gemini AI</button>

<div class="progress">
<div id="bar" class="bar">0%</div>
</div>

<div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
